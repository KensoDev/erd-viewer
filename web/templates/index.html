<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERD Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div id="toolbar">
  <h1 id="title">ERD Viewer</h1>
  <input id="search" type="text" placeholder="Search tables…" />
  <button id="btn-fit">Fit</button>
  <button id="btn-reset">Reset layout</button>
  <div class="divider"></div>
  <button id="btn-select-all">Select All</button>
  <button id="btn-select-none">Deselect All</button>
  <span id="selection-count">0 selected</span>
  <div class="divider"></div>
  <button id="btn-export-drawio" class="export-btn">Export to Draw.io</button>
  <button id="btn-export-plantuml" class="export-btn">Export to PlantUML</button>
</div>

<svg id="canvas">
  <defs>
    <marker id="arrow-fk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-fk-hl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b" />
    </marker>
  </defs>
  <g id="root">
    <g id="edges"></g>
    <g id="nodes"></g>
  </g>
</svg>

<div id="tooltip"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
