  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build
      run: go build -v -o erd-viewer ./cmd/erd-viewer

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: erd-viewer-linux-amd64
        path: erd-viewer

  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build
      run: go build -v -o erd-viewer${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/erd-viewer
