version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: northwind
    ports:
      - "5432:5432"
    volumes:
      - ./examples/northwind.sql:/docker-entrypoint-initdb.d/northwind.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d northwind"]
      interval: 5s
      timeout: 5s
      retries: 5

  erd-viewer:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=demo
    command: >
      /app/erd-viewer
      --host postgres
      --port 5432
      --username demo
      --db northwind
      --schema public
      --listen 0.0.0.0:3000
