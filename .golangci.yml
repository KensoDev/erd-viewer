linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - revive
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-blank: true

  revive:
    rules:
      - name: exported
        disabled: false

run:
  timeout: 5m
  tests: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
